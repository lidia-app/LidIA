name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    # Use the newest macOS runner available; this project targets macOS 26 APIs.
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
