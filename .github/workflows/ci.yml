name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    # This project requires macOS 26 (Tahoe) + Swift 6.2.
    # GitHub Actions does not yet offer macOS 26 runners.
    # CI will be enabled once macOS 26 runners are available.
    # For now, we run a syntax/lint check only.
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: Check Swift tools version
        run: |
          REQUIRED="6.2"
          INSTALLED=$(swift --version 2>&1 | grep -oE '[0-9]+\.[0-9]+' | head -1)
          echo "Required: $REQUIRED, Installed: $INSTALLED"
          if [ "$(printf '%s\n' "$REQUIRED" "$INSTALLED" | sort -V | head -1)" != "$REQUIRED" ]; then
            echo "::warning::Swift $REQUIRED required but $INSTALLED installed. Skipping build until macOS 26 runners are available."
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
          fi

      - name: Build
        if: env.SKIP_BUILD != 'true'
        run: swift build

      - name: Test
        if: env.SKIP_BUILD != 'true'
        run: swift test
