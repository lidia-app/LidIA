name: LidIAWatch
options:
  bundleIdPrefix: io.lidia
  deploymentTarget:
    watchOS: "11.0"
  xcodeVersion: "26.0"

packages:
  LidIAKit:
    path: ../Packages/LidIAKit

targets:
  LidIAWatch:
    type: application
    platform: watchOS
    sources:
      - Sources
      - path: Resources/Assets.xcassets
        type: resource
    dependencies:
      - package: LidIAKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.lidia.watch
        INFOPLIST_FILE: Resources/Info.plist
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
